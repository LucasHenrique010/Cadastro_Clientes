<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro do Responsável</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    margin-top:50px;
}

table{
    background:white;
    padding:20px;
    border-collapse: collapse;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

td{
    padding:10px;
}

input, select{
    padding:6px;
    width:200px;
}

button{
    padding:8px;
    width:100%;
}
</style>

</head>

<body>

<table>

<tr>
<td>Nome do responsável:</td>
<td><input id="nome" type="text" placeholder="Digite seu nome" required></td>
</tr>

<tr>
<td>Email:</td>
<td><input id="email" type="email" placeholder="exemplo@email.com" required></td>
</tr>

<tr>
<td>CPF:</td>
<td>
<input 
type="text"
id="cpf"
placeholder="000.000.000-00"
maxlength="14"
required>
</td>
</tr>

<tr>
<td>Telefone:</td>
<td>
<input
type="text"
id="telefone"
placeholder="(11) 99999-9999"
maxlength="15"
required>
</td>
</tr>

<tr>
<td>Endereço:</td>
<td><input id="endereco" type="text" placeholder="Rua, número, bairro"></td>
</tr>

<tr>
<td>Dia de vencimento:</td>
<td>
<select id="vencimento" required>
<option value="">Selecione o dia</option>
<option value="5">Dia 05</option>
<option value="10">Dia 10</option>
<option value="15">Dia 15</option>
<option value="20">Dia 20</option>
<option value="25">Dia 25</option>
<option value="30">Dia 30</option>
</select>
</td>
</tr>

<tr>
<td colspan="2">
<button onclick="proximo()">Próximo</button>
</td>
</tr>

</table>

<script>

// Formatar CPF automaticamente
document.getElementById('cpf').addEventListener('input', function(e){
let value = e.target.value.replace(/\D/g, '');

if(value.length > 3) value = value.replace(/(\d{3})(\d)/, '$1.$2');
if(value.length > 7) value = value.replace(/(\d{3})(\d)/, '$1.$2');
if(value.length > 11) value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');

e.target.value = value;
});


// Formatar telefone automaticamente
document.getElementById('telefone').addEventListener('input', function(e){
let value = e.target.value.replace(/\D/g, '');

if(value.length > 2) value = value.replace(/(\d{2})(\d)/, '($1) $2');
if(value.length > 9) value = value.replace(/(\d{5})(\d)/, '$1-$2');

e.target.value = value;
});


// Salvar dados e ir para próxima página
function proximo(){

let dados = {
nome: document.getElementById("nome").value,
email: document.getElementById("email").value,
cpf: document.getElementById("cpf").value,
telefone: document.getElementById("telefone").value,
endereco: document.getElementById("endereco").value,
vencimento: document.getElementById("vencimento").value
}

localStorage.setItem("responsavel", JSON.stringify(dados))

window.location.href = "crianca.html";

}

</script>

</body>
</html>
